spring.application.name=user-service
server.port=8081

# H2 Database (default for dev - switch to MySQL for prod)
spring.datasource.url=jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# MySQL config (uncomment for production)
# spring.datasource.url=jdbc:mysql://localhost:3306/userdb?createDatabaseIfNotExist=true
