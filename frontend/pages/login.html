<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login - CinemaBook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-gray-950 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-4">
        <!-- Logo -->
        <div class="text-center mb-10">
            <i class="fas fa-film text-red-600 text-5xl mb-4"></i>
            <h1 class="text-3xl font-black text-white">CinemaBook</h1>
            <p class="text-gray-500 mt-1">Customer Login</p>
        </div>

        <!-- Login Card -->
        <div class="bg-gray-900 rounded-2xl p-8 shadow-2xl border border-gray-800">
            <h2 class="text-xl font-bold text-white mb-6 text-center">Welcome Back!</h2>

            <div id="errorAlert"
                class="hidden bg-red-900 border border-red-700 text-red-300 px-4 py-3 rounded-lg mb-6 text-sm"></div>

            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Email Address</label>
                    <div class="relative">
                        <span class="absolute left-3 top-3 text-gray-500"><i class="fas fa-envelope"></i></span>
                        <input id="email" type="email" placeholder="hello@example.com"
                            class="w-full bg-gray-800 border border-gray-700 text-white pl-10 pr-4 py-3 rounded-xl focus:outline-none focus:border-red-500 transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute left-3 top-3 text-gray-500"><i class="fas fa-lock"></i></span>
                        <input id="password" type="password" placeholder="••••••••"
                            class="w-full bg-gray-800 border border-gray-700 text-white pl-10 pr-4 py-3 rounded-xl focus:outline-none focus:border-red-500 transition"
                            onkeypress="if(event.key==='Enter') doCustomerLogin()">
                    </div>
                </div>

                <button id="loginBtn" onclick="doCustomerLogin()"
                    class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </div>

            <div class="mt-6 text-center text-sm text-gray-400">
                Don't have an account? <a href="#" class="text-red-500 hover:text-red-400 transition"
                    onclick="alert('Signup is coming soon!')">Sign up</a>
            </div>
        </div>

        <p class="text-center text-gray-600 text-sm mt-6">
            <a href="../index.html" class="text-red-500 hover:text-red-400">← Back to Home</a>
        </p>
        <p class="text-center text-gray-800 text-xs mt-4">
            <a href="admin/login.html" class="hover:text-gray-500 transition">Admin Login</a>
        </p>
    </div>

    <script>
        function doCustomerLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errDiv = document.getElementById('errorAlert');

            if (!email || !password) {
                errDiv.textContent = 'Please enter email and password';
                errDiv.classList.remove('hidden');
                return;
            }

            // Since there is no full customer auth in API, we'll mock login
            // You can replace this logic when the user service implements JWT login
            localStorage.setItem('customerEmail', email);
            window.location.href = '../index.html';
        }
    </script>
</body>

</html>
