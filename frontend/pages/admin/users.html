<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - CinemaBook Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: #0d0d0d;
        }

        .sidebar-link.active,
        .sidebar-link:hover {
            background: rgba(229, 9, 20, 0.15);
            color: #ef4444;
        }
    </style>
</head>

<body class="text-white min-h-screen flex">
    <aside class="w-64 bg-gray-950 border-r border-gray-800 flex flex-col fixed h-full z-20">
        <div class="p-5 border-b border-gray-800">
            <div class="flex items-center gap-3"><i class="fas fa-film text-red-600 text-2xl"></i>
                <div>
                    <div class="font-black text-lg text-red-500">CinemaBook</div>
                    <div class="text-xs text-gray-500">Admin Panel</div>
                </div>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <a href="dashboard.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 transition text-sm"><i class="fas fa-tachometer-alt w-5"></i> Dashboard</a>
            <a href="movies.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 transition text-sm"><i class="fas fa-film w-5"></i> Movies</a>
            <a href="theaters.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 transition text-sm"><i class="fas fa-building w-5"></i> Theaters</a>
            <a href="showtimes.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 transition text-sm"><i class="fas fa-clock w-5"></i> Showtimes</a>
            <a href="bookings.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 transition text-sm"><i class="fas fa-ticket-alt w-5"></i> Bookings</a>
            <a href="seats.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 transition text-sm"><i class="fas fa-chair w-5"></i> Seats</a>
            <a href="tickets.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 transition text-sm"><i class="fas fa-receipt w-5"></i> Tickets</a>
            <a href="users.html" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-xl transition text-sm bg-red-900/20 text-red-500"><i class="fas fa-users w-5"></i> Users</a>
            <a href="pricing.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 transition text-sm"><i class="fas fa-tags w-5"></i> Pricing</a>
            <a href="reports.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 transition text-sm"><i class="fas fa-chart-bar w-5"></i> Reports</a>
        </nav>
        <div class="p-4 border-t border-gray-800"><button onclick="doLogout()"
                class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-red-400 hover:bg-red-950 transition text-sm"><i
                    class="fas fa-sign-out-alt w-5"></i> Logout</button></div>
    </aside>
    <main class="ml-64 flex-1 p-8">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-black">Users & Staff</h1>
                <p class="text-gray-500 mt-1">Manage registered customers, staff and admins.</p>
            </div>
            <button id="addUserBtn" onclick="openModal()"
                class="hidden bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 transition"><i
                    class="fas fa-plus"></i> Add User / Staff
            </button>
        </div>
        <!-- Search -->
        <div class="mb-6 relative w-72">
            <i class="fas fa-search absolute left-3 top-3 text-gray-500 text-sm"></i>
            <input id="searchInput" type="text" placeholder="Search users..."
                class="w-full bg-gray-800 text-white pl-9 pr-4 py-2.5 rounded-xl border border-gray-700 focus:outline-none focus:border-red-500 text-sm"
                oninput="filterItems()">
        </div>
        <div class="bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-800 text-gray-400">
                        <tr>
                            <th class="px-6 py-4 text-left">ID</th>
                            <th class="px-6 py-4 text-left">Name</th>
                            <th class="px-6 py-4 text-left">Email</th>
                            <th class="px-6 py-4 text-left">Role</th>
                            <th class="px-6 py-4 text-left">Status</th>
                            <th class="px-6 py-4 text-left">Registered</th>
                            <th id="actionsHeader" class="hidden px-6 py-4 text-left">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="7" class="text-center py-8 text-gray-600">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="theModal" class="hidden fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-700 rounded-2xl p-8 w-full max-w-md">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold" id="modalTitle">Add User / Staff</h3><button onclick="closeModal()"
                    class="text-gray-500 hover:text-white text-xl"><i class="fas fa-times"></i></button>
            </div>
            <div class="space-y-4">
                <div><label class="text-sm text-gray-400 block mb-1">Full Name *</label><input id="fName"
                        class="w-full bg-gray-800 border border-gray-700 text-white px-4 py-2 rounded-xl focus:outline-none focus:border-red-500"
                        placeholder="John Doe"></div>
                <div><label class="text-sm text-gray-400 block mb-1">Email *</label><input id="fEmail" type="email"
                        class="w-full bg-gray-800 border border-gray-700 text-white px-4 py-2 rounded-xl focus:outline-none focus:border-red-500"
                        placeholder="john@email.com"></div>
                <div><label class="text-sm text-gray-400 block mb-1">Phone</label><input id="fPhone"
                        class="w-full bg-gray-800 border border-gray-700 text-white px-4 py-2 rounded-xl focus:outline-none focus:border-red-500"
                        placeholder="+94 77 123 4567"></div>
                <div><label class="text-sm text-gray-400 block mb-1">Role *</label>
                    <select id="fRole"
                        class="w-full bg-gray-800 border border-gray-700 text-white px-4 py-2 rounded-xl focus:outline-none focus:border-red-500">
                        <option value="STAFF">Staff</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                </div>
                <div><label class="text-sm text-gray-400 block mb-1">Password</label><input id="fPassword"
                        type="password"
                        class="w-full bg-gray-800 border border-gray-700 text-white px-4 py-2 rounded-xl focus:outline-none focus:border-red-500"
                        placeholder="Password"></div>
                <div class="flex items-center gap-2"><input id="fActive" type="checkbox" checked
                        class="w-4 h-4 accent-red-600"><label class="text-sm text-gray-400">Active Account</label></div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="saveItem()"
                    class="flex-1 bg-red-600 hover:bg-red-700 text-white py-3 rounded-xl font-bold transition"><i
                        class="fas fa-save mr-2"></i> Save</button>
                <button onclick="closeModal()"
                    class="px-6 py-3 rounded-xl bg-gray-800 text-gray-300 hover:bg-gray-700 transition">Cancel</button>
            </div>
        </div>
    </div>

    <script src="../../js/api.js"></script>
    <script>
        if (!Session.isAdminLoggedIn()) window.location.href = 'login.html';
        function doLogout() { if (confirm('Logout?')) { Session.clearAdmin(); window.location.href = 'login.html'; } }

        let allItems = [], editingId = null;

        async function loadItems() {
            const data = await UserAPI.getAll();
            allItems = data || [];
            renderTable(allItems);
        }

        function filterItems() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderTable(allItems.filter(u => u.fullName?.toLowerCase().includes(q) || u.name?.toLowerCase().includes(q) || u.email?.toLowerCase().includes(q)));
        }

        function renderTable(items) {
            const currentAdmin = Session.getAdmin();
            const isAdmin = currentAdmin && (currentAdmin.role === 'SUPER_ADMIN' || currentAdmin.role === 'ADMIN');

            const addBtn = document.getElementById('addUserBtn');
            const actionsHeader = document.getElementById('actionsHeader');
            if (isAdmin) {
                addBtn.classList.remove('hidden');
                actionsHeader.classList.remove('hidden');
            } else {
                addBtn.classList.add('hidden');
                actionsHeader.classList.add('hidden');
            }

            const tbody = document.getElementById('tableBody');
            const colspan = isAdmin ? 7 : 6;
            if (!items.length) { tbody.innerHTML = `<tr><td colspan="${colspan}" class="text-center py-8 text-gray-600">No users found. Start User Service on port 8081.</td></tr>`; return; }
            tbody.innerHTML = items.map(u => `
                <tr class="border-b border-gray-800 hover:bg-gray-800 transition">
                    <td class="px-6 py-4 text-gray-500">${u.id}</td>
                    <td class="px-6 py-4 font-medium">${u.fullName || u.name || '-'}</td>
                    <td class="px-6 py-4 text-gray-400">${u.email || '-'}</td>
                    <td class="px-6 py-4"><span class="px-2 py-1 rounded-full text-xs font-bold ${u.role === 'ADMIN' ? 'bg-red-900 text-red-400' : (u.role === 'STAFF' ? 'bg-blue-900 text-blue-400' : 'bg-gray-800 text-gray-400')}">${u.role || 'CUSTOMER'}</span></td>
                    <td class="px-6 py-4"><span class="px-2 py-1 rounded-full text-xs font-bold ${u.active !== false ? 'bg-green-900 text-green-400' : 'bg-gray-800 text-gray-500'}">${u.active !== false ? 'Active' : 'Inactive'}</span></td>
                    <td class="px-6 py-4 text-gray-400 text-xs">${u.createdAt ? new Date(u.createdAt).toLocaleDateString() : '-'}</td>
                    ${isAdmin ? `
                    <td class="px-6 py-4"><div class="flex gap-2">
                        <button onclick="editItem(${u.id})" class="text-blue-400 hover:text-blue-300 p-2 hover:bg-blue-950 rounded-lg transition"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteItem(${u.id}, '${u.fullName || u.name || u.email}')" class="text-red-400 hover:text-red-300 p-2 hover:bg-red-950 rounded-lg transition"><i class="fas fa-trash"></i></button>
                    </div></td>` : ''}
                </tr>`).join('');
        }

        function openModal(item = null) { document.getElementById('theModal').classList.remove('hidden'); populateForm(item); }
        function closeModal() { document.getElementById('theModal').classList.add('hidden'); editingId = null; }
        function populateForm(item) {
            editingId = item ? item.id : null;
            document.getElementById('modalTitle').textContent = item ? 'Edit User / Staff' : 'Add User / Staff';
            document.getElementById('fName').value = item?.fullName || item?.name || '';
            document.getElementById('fEmail').value = item?.email || '';
            document.getElementById('fPhone').value = item?.phone || '';
            document.getElementById('fRole').value = item?.role || 'STAFF';
            document.getElementById('fPassword').value = '';
            document.getElementById('fActive').checked = item ? item.active !== false : true;
        }

        async function saveItem() {
            const data = {
                name: document.getElementById('fName').value.trim(),
                email: document.getElementById('fEmail').value.trim(),
                phone: document.getElementById('fPhone').value.trim() || "-",
                role: document.getElementById('fRole').value,
                active: document.getElementById('fActive').checked,
            };
            if (document.getElementById('fPassword').value) {
                data.password = document.getElementById('fPassword').value;
            }
            if (!data.name || !data.email) { alert('Name and email are required'); return; }
            const result = editingId ? await UserAPI.update(editingId, data) : await UserAPI.create(data);
            if (result) { closeModal(); loadItems(); }
            else alert('Failed to save. Make sure User Service is running.');
        }

        function editItem(id) { const item = allItems.find(u => u.id === id); if (item) openModal(item); }
        async function deleteItem(id, name) { if (!confirm("Delete '" + name + "'?")) return; await UserAPI.delete(id); loadItems(); }
        loadItems();
    </script>
</body>

</html>
