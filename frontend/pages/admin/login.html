<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CinemaBook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-gray-950 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-4">
        <!-- Logo -->
        <div class="text-center mb-10">
            <i class="fas fa-film text-red-600 text-5xl mb-4"></i>
            <h1 class="text-3xl font-black text-white">CinemaBook</h1>
            <p class="text-gray-500 mt-1">Admin Portal</p>
        </div>

        <!-- Login Card -->
        <div class="bg-gray-900 rounded-2xl p-8 shadow-2xl border border-gray-800">
            <h2 class="text-xl font-bold text-white mb-6 text-center">Sign In to Admin Panel</h2>

            <div id="errorAlert"
                class="hidden bg-red-900 border border-red-700 text-red-300 px-4 py-3 rounded-lg mb-6 text-sm"></div>

            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Email Address</label>
                    <div class="relative">
                        <span class="absolute left-3 top-3 text-gray-500"><i class="fas fa-envelope"></i></span>
                        <input id="email" type="email" value="admin@cinema.com" placeholder="admin@cinema.com"
                            class="w-full bg-gray-800 border border-gray-700 text-white pl-10 pr-4 py-3 rounded-xl focus:outline-none focus:border-red-500 transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Password</label>
                    <div class="relative">
                        <span class="absolute left-3 top-3 text-gray-500"><i class="fas fa-lock"></i></span>
                        <input id="password" type="password" value="admin123" placeholder="••••••••"
                            class="w-full bg-gray-800 border border-gray-700 text-white pl-10 pr-4 py-3 rounded-xl focus:outline-none focus:border-red-500 transition"
                            onkeypress="if(event.key==='Enter') doLogin()">
                    </div>
                </div>

                <button id="loginBtn" onclick="doLogin()"
                    class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition flex items-center justify-center gap-2">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </div>

            <div class="mt-6 p-4 bg-gray-800 rounded-xl text-sm text-gray-400">
                <p class="font-medium text-gray-300 mb-1"><i class="fas fa-info-circle text-blue-400 mr-1"></i> Demo
                    Credentials</p>
                <p>Email: <span class="text-white">admin@cinema.com</span></p>
                <p>Password: <span class="text-white">admin123</span></p>
                <p class="mt-2 text-xs text-gray-500">Make sure Admin Service is running on port 8089</p>
            </div>
        </div>

        <p class="text-center text-gray-600 text-sm mt-6">
            <a href="../../index.html" class="text-red-500 hover:text-red-400">← Back to Customer Site</a>
        </p>
    </div>

    <script src="../../js/api.js"></script>
    <script>
        // Redirect if already logged in
        if (Session.isAdminLoggedIn()) {
            window.location.href = 'dashboard.html';
        }

        async function doLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');
            const errDiv = document.getElementById('errorAlert');

            if (!email || !password) {
                errDiv.textContent = 'Please enter email and password';
                errDiv.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Signing in...';
            errDiv.classList.add('hidden');

            try {
                // First try User Service (for STAFF and ADMIN roles created via Users & Staff UI)
                const userCheck = await UserAPI.findByEmail(email);
                if (userCheck && userCheck.password === password) {
                    if (userCheck.role === 'ADMIN' || userCheck.role === 'STAFF') {
                        Session.setAdmin({
                            success: true,
                            adminId: userCheck.id,
                            email: userCheck.email,
                            role: userCheck.role,
                            fullName: userCheck.name || userCheck.fullName,
                            token: 'user-token'
                        });
                        window.location.href = 'dashboard.html';
                        return;
                    } else {
                        throw new Error('Access denied. You do not have Staff or Admin privileges.');
                    }
                }
            } catch (e) {
                if (e.message.includes('Access denied')) {
                    errDiv.textContent = e.message;
                    errDiv.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                    return;
                }
                // If not found in User Service or API error, we continue to AdminService
            }

            // Fallback to Admin Service Auth
            const result = await AdminAPI.login(email, password);

            if (result && result.success) {
                Session.setAdmin(result);
                window.location.href = 'dashboard.html';
            } else {
                // Fallback demo mode if backend is not running
                if (email === 'admin@cinema.com' && password === 'admin123') {
                    Session.setAdmin({ success: true, adminId: 1, email, role: 'SUPER_ADMIN', fullName: 'System Administrator', token: 'demo-token' });
                    window.location.href = 'dashboard.html';
                } else {
                    errDiv.textContent = result?.message || 'Invalid credentials. Backend may not be running. Use demo credentials.';
                    errDiv.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                }
            }
        }
    </script>
</body>

</html>
