<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offers & Promotions - CinemaBook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#e50914' } } } }
    </script>
    <style>
        body {
            background-color: #0a0a0a;
        }

        .gradient-text {
            background: linear-gradient(to right, #e50914, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .promo-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .promo-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px -5px rgba(229, 9, 20, 0.4);
            border-color: rgba(229, 9, 20, 0.5);
        }
    </style>
</head>

<body class="text-white min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-black bg-opacity-95 fixed w-full z-50 top-0 border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <i class="fas fa-film text-red-600 text-2xl"></i>
                <a href="../index.html" class="text-2xl font-bold gradient-text">CinemaBook</a>
            </div>
            <div class="hidden md:flex items-center space-x-8">
                <a href="../index.html" class="text-gray-300 hover:text-white transition">Home</a>
                <a href="movies.html" class="text-gray-300 hover:text-white transition">Movies</a>
                <a href="theaters.html" class="text-gray-300 hover:text-white transition">Theaters</a>
                <a href="promotions.html" class="text-red-500 font-medium tracking-wide">Offers</a>
                <a href="booking.html" class="text-gray-300 hover:text-white transition">My Bookings</a>
            </div>
            <a href="login.html"
                class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition">Login</a>
        </div>
    </nav>

    <!-- Header -->
    <div class="pt-24 pb-12 px-4 bg-gradient-to-b from-red-900/20 to-transparent">
        <div class="max-w-7xl mx-auto text-center pt-8">
            <h1 class="text-4xl md:text-5xl font-black mb-4">Exclusive <span class="text-red-600">Offers</span></h1>
            <p class="text-gray-400 max-w-2xl mx-auto text-lg">Grab the best deals! Use these promotion codes at
                checkout to get amazing discounts on your movie tickets.</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 pb-20 flex-1 w-full">
        <!-- Search -->
        <div class="max-w-md mx-auto mb-12">
            <div class="relative">
                <i class="fas fa-gift absolute left-4 top-3.5 text-red-500"></i>
                <input type="text" id="promoSearch" placeholder="Search for promotion codes..."
                    class="w-full bg-gray-900 text-white pl-11 pr-4 py-3 rounded-full border border-gray-800 focus:outline-none focus:border-red-500 transition shadow-lg">
            </div>
        </div>

        <div id="loadingState" class="text-center py-16 text-gray-500">
            <i class="fas fa-circle-notch fa-spin text-4xl mb-4 text-red-600"></i>
            <p class="text-lg">Loading exclusive offers...</p>
        </div>

        <div id="emptyState" class="hidden text-center py-16">
            <div
                class="bg-gray-900 rounded-full w-24 h-24 flex items-center justify-center mx-auto mb-6 border border-gray-800">
                <i class="fas fa-ticket-alt text-4xl text-gray-600"></i>
            </div>
            <h3 class="text-2xl font-bold mb-2">No active offers</h3>
            <p class="text-gray-500">Check back later for exciting new promotions!</p>
        </div>

        <!-- Promotions Grid -->
        <div id="promosGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden">
            <!-- Promo cards will be injected here -->
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        let allPromotions = [];

        async function loadPromotions() {
            try {
                // Note: API integration
                const promotions = await PromotionAPI.getAll();
                // Filter only active and not expired
                const today = new Date().toISOString().split('T')[0];
                allPromotions = (promotions || []).filter(p => p.active && p.validUntil >= today);

                document.getElementById('loadingState').classList.add('hidden');

                if (!allPromotions.length) {
                    document.getElementById('emptyState').classList.remove('hidden');
                    return;
                }

                document.getElementById('promosGrid').classList.remove('hidden');
                renderPromos(allPromotions);
            } catch (error) {
                console.error("Error loading promotions:", error);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
            }
        }

        function renderPromos(promos) {
            const grid = document.getElementById('promosGrid');
            if (!promos.length) {
                grid.innerHTML = '';
                document.getElementById('promosGrid').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }

            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('promosGrid').classList.remove('hidden');

            grid.innerHTML = promos.map(p => `
                <div class="promo-card bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden relative group">
                    <div class="absolute top-0 right-0 bg-red-600 text-white font-black px-4 py-1.5 rounded-bl-xl z-10 text-sm">
                        ${p.discountPercentage}% OFF
                    </div>
                    
                    <div class="p-8">
                        <div class="w-12 h-12 bg-red-900/30 text-red-500 rounded-xl flex items-center justify-center mb-6 border border-red-500/20">
                            <i class="fas fa-percentage text-xl"></i>
                        </div>
                        
                        <h3 class="text-2xl font-black mb-2 tracking-tight">${p.code}</h3>
                        <p class="text-gray-400 mb-6 text-sm">Use this code at checkout to receive a ${p.discountPercentage}% discount on your entire booking.</p>
                        
                        <div class="flex items-center justify-between border-t border-gray-800 pt-4 mt-auto">
                            <div class="flex items-center gap-2 text-sm text-gray-500">
                                <i class="far fa-calendar-alt"></i>
                                <span>Valid till <span class="text-gray-300 font-medium">${formatDate(p.validUntil)}</span></span>
                            </div>
                            
                            <button onclick="copyCode('${p.code}')" class="text-red-500 hover:text-white bg-red-950/50 hover:bg-red-600 px-3 py-1.5 rounded-lg transition text-xs font-bold uppercase tracking-wider flex items-center gap-1">
                                <i class="far fa-copy"></i> Copy
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateStr).toLocaleDateString(undefined, options);
        }

        function copyCode(code) {
            navigator.clipboard.writeText(code).then(() => {
                const toast = document.createElement('div');
                toast.className = 'fixed bottom-6 right-6 bg-green-600 text-white px-6 py-3 rounded-xl font-bold shadow-2xl z-50 flex items-center gap-2 transform transition-all duration-300 translate-y-0 opacity-100';
                toast.innerHTML = `<i class="fas fa-check-circle"></i> Code '${code}' copied!`;
                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.classList.add('translate-y-4', 'opacity-0');
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            });
        }

        document.getElementById('promoSearch').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allPromotions.filter(p => p.code.toLowerCase().includes(query));
            renderPromos(filtered);
        });

        loadPromotions();
    </script>
</body>

</html>
